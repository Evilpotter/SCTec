<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <section>
        <form action="">
            <label for="nome">Nome: </label>
            <input type="text" name="nome" id="nome" required><br>

            <label for="email">E-mail: </label>
            <input type="email" name="email" id="email" required><br>

            <label for="idade">Idade: </label>
            <input type="number" name="idade" id="idade" required><br>

            <label for="vaga">Para qual matéria você está se candidatando para lecionar: </label><br>
            <select name="vaga" id="vaga" required>
                <option value="matematica">Matemática</option>
                <option value="portugues">Português</option>
                <option value="biologia">Biologia</option>
                <option value="ciencias">Ciências</option>
                <option value="historia">História</option>
                <option value="geografia">Geografia</option>
                <option value="artes">Artes</option>
            </select><br>

            <label for="escolaridade">Nível de escolaridade: </label><br>
            <select name="vaga" id="vaga" required>
                <option value="superiorCompleto">Ensino superior completo</option>
                <option value="cursandoMestrado">Cursando mestrado</option>
                <option value="mestradoCompleto">Mestrado completo</option>
                <option value="cursandoDoutorado">Cursando doutorado</option>
                <option value="doutoradoCompleto">Doutorado completo</option>
            </select><br>

            <label for="descricao">Insira uma breve descrição</label><br>
            <textarea type="descricao" id="descricao" cols="50" rows="5" maxlength="200" required></textarea><br>

            <input type="submit" value="Enviar mensagem">

        </form>
    </section>
</body>

</html>
